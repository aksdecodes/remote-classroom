<!DOCTYPE html>
<html lang="en">
<head>+
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Remote Classroom</title>
  <link rel="stylesheet" href="src/css/style.css" />
  <link rel="stylesheet" href="../css/style.css">
  
  <style>
    .hero {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      background: linear-gradient(135deg, var(--teal-dark) 0%, var(--teal) 55%, #2a8fa4 100%);
      padding: 2rem;
      position: relative;
      overflow: hidden;
    }
    .hero::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image: radial-gradient(circle at 20% 80%, rgba(255,255,255,0.06) 0%, transparent 50%),
                        radial-gradient(circle at 80% 20%, rgba(255,255,255,0.06) 0%, transparent 50%);
    }
    .hero-content { position: relative; z-index: 1; max-width: 600px; }
    .hero-logo {
      font-family: 'Playfair Display', serif;
      font-size: 3rem;
      color: #fff;
      margin-bottom: 1rem;
    }
    .hero-logo span { color: var(--amber); }
    .hero p {
      color: rgba(255,255,255,0.8);
      font-size: 1.1rem;
      margin-bottom: 2.5rem;
      line-height: 1.7;
    }
    .hero-btns { display: flex; gap: 1rem; justify-content: center; flex-wrap: wrap; }
    .btn-white {
      background: #fff;
      color: var(--teal-dark);
      font-weight: 600;
      padding: 0.75rem 2rem;
      border-radius: 8px;
      font-size: 1rem;
      border: none;
      cursor: pointer;
      text-decoration: none;
      transition: all 0.2s;
    }
    .btn-white:hover { background: var(--amber); color: #fff; }
    .btn-ghost {
      background: transparent;
      color: #fff;
      border: 2px solid rgba(255,255,255,0.5);
      padding: 0.75rem 2rem;
      border-radius: 8px;
      font-size: 1rem;
      cursor: pointer;
      text-decoration: none;
      transition: all 0.2s;
    }
    .btn-ghost:hover { border-color: #fff; background: rgba(255,255,255,0.1); }
    .features {
      display: flex;
      gap: 1.5rem;
      margin-top: 3rem;
      flex-wrap: wrap;
      justify-content: center;
    }
    .feature-pill {
      background: rgba(255,255,255,0.12);
      border: 1px solid rgba(255,255,255,0.2);
      color: rgba(255,255,255,0.9);
      padding: 0.4rem 1rem;
      border-radius: 20px;
      font-size: 0.85rem;
    }
  </style>
</head>
<body>
  <div class="hero">
    <div class="hero-content">
      <div class="hero-logo">📘 Remote<span>Classroom</span></div>
      <p>Bridging the gap between rural students and quality education. Access lectures, attempt quizzes, and learn — from anywhere.</p>
      <div class="hero-btns">
        <a href="src/pages/login.html" class="btn-white">Sign In</a>
        <a href="src/pages/register.html" class="btn-ghost">Create Account</a>
      </div>
      <div class="features">
        <span class="feature-pill">📄 PDF Lectures</span>
        <span class="feature-pill">🎬 Video Classes</span>
        <span class="feature-pill">📝 MCQ Quizzes</span>
        <span class="feature-pill">🏫 Class Groups</span>
      </div>
    </div>
  </div>

  <script>
    if (localStorage.getItem('token')) {
      window.location.href = 'src/pages/dashboard.html';
    }
  </script>
</body>
</html>
