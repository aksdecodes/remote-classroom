<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Register — Remote Classroom</title>
  <link rel="stylesheet" href="../css/style.css" />
  <link rel="stylesheet" href="../css/style.css">
  <script src="../js/auth.js"></script>
  
  
</head>
<body>
  
  
<a href="login.html">Already have account? Login</a>
  <div class="auth-wrap">
    <div class="auth-card">
      <div class="auth-logo">📘 Remote<span>Classroom</span></div>
      <p class="auth-sub">Create your account</p>

      <div id="alert" class="alert alert-error"></div>
      <div id="success" class="alert alert-success"></div>

      <div class="form-group">
        <label for="name">Full Name</label>
        <input type="text" id="name" class="form-control" placeholder="Asha Patil" />
      </div>
      <div class="form-group">
        <label for="email">Email Address</label>
        <input type="email" id="email" class="form-control" placeholder="asha@example.com" />
      </div>
      <div class="form-group">
        <label for="password">Password <span style="color:var(--muted);font-size:0.78rem;">(min 6 chars)</span></label>
        <input type="password" id="password" class="form-control" placeholder="••••••••" />
      </div>
      <div class="form-group">
        <label for="role">I am a…</label>
        <select id="role" class="form-control">
          <option value="student">Student</option>
          <option value="teacher">Teacher</option>
        </select>
      </div>
      <div class="form-group" id="classGroup">
        <label for="classId">Your Class</label>
        <select id="classId" class="form-control">
          <option value="">Loading classes…</option>
        </select>
      </div>

      <button id="registerBtn" class="btn btn-primary w-full" style="justify-content:center; margin-top:0.5rem;">
        Create Account
      </button>

      <p class="auth-footer">
        Already have an account? <a href="login.html">Sign in</a>
      </p>
    </div>
  </div>

  <script>
    const BASE = 'http://localhost:5000/api';

    if (localStorage.getItem('token')) window.location.href = 'dashboard.html';

    const showAlert = (msg, type = 'error') => {
      const el = document.getElementById(type === 'error' ? 'alert' : 'success');
      el.textContent = msg;
      el.classList.add('show');
      setTimeout(() => el.classList.remove('show'), 4000);
    };

    // Load classes for dropdown
    async function loadClasses() {
      try {
        const res  = await fetch(`${BASE}/classes`);
        const data = await res.json();
        const sel  = document.getElementById('classId');
        sel.innerHTML = '<option value="">— Select your class —</option>';
        data.forEach(cls => {
          sel.innerHTML += `<option value="${cls._id}">${cls.name}</option>`;
        });
      } catch {
        document.getElementById('classId').innerHTML = '<option>Could not load classes</option>';
      }
    }
    loadClasses();

    // Toggle class select visibility
    document.getElementById('role').addEventListener('change', (e) => {
      document.getElementById('classGroup').style.display =
        e.target.value === 'student' ? 'block' : 'none';
    });

    document.getElementById('registerBtn').addEventListener('click', async () => {
      const name     = document.getElementById('name').value.trim();
      const email    = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const role     = document.getElementById('role').value;
      
      const btn      = document.getElementById('registerBtn');

      if (!name || !email || !password) return showAlert('Please fill all required fields.');
      
      btn.disabled = true;
      btn.textContent = 'Creating account…';

      try {
        const res  = await fetch(`${BASE}/auth/register`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name, email, password, role }),
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.message);

        localStorage.setItem('token', data.token);
        localStorage.setItem('user', JSON.stringify(data));
        showAlert('Account created! Redirecting…', 'success');
        setTimeout(() => window.location.href = 'dashboard.html', 1200);
      } catch (err) {
        showAlert(err.message || 'Registration failed.');
        btn.disabled = false;
        btn.textContent = 'Create Account';
      }
    });
  </script>
</body>
</html>
