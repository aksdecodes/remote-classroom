<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Remote Classroom</title>

  <link rel="stylesheet" href="../css/style.css">

  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
    }

    .hero {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      background: linear-gradient(135deg, #1e5f6e, #2b7a8b, #2a8fa4);
      padding: 2rem;
      position: relative;
      overflow: hidden;
    }

    /* soft glowing background */
    .hero::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at 30% 70%, rgba(255,255,255,0.08), transparent),
                  radial-gradient(circle at 70% 30%, rgba(255,255,255,0.08), transparent);
    }

    .hero-content {
      position: relative;
      z-index: 1;
      max-width: 650px;
    }

    .hero-logo {
      font-size: 3rem;
      color: #fff;
      font-weight: bold;
      margin-bottom: 1rem;
    }

    .hero-logo span {
      color: #ffd166;
    }

    .hero p {
      color: rgba(255,255,255,0.85);
      font-size: 1.1rem;
      margin-bottom: 2.5rem;
      line-height: 1.7;
    }

    .hero-btns {
      display: flex;
      gap: 1rem;
      justify-content: center;
      flex-wrap: wrap;
    }

    /* NEW BLUE BUTTON */
    .btn-primary {
      background: linear-gradient(135deg, #7c4ddd, #6a3ec2);
      color: white;
      padding: 0.8rem 2rem;
      border-radius: 10px;
      font-weight: bold;
      text-decoration: none;
      transition: 0.2s;
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(0,0,0,0.3);
    }

    .btn-ghost {
      background: transparent;
      color: #fff;
      border: 2px solid rgba(255,255,255,0.6);
      padding: 0.8rem 2rem;
      border-radius: 10px;
      text-decoration: none;
      transition: 0.2s;
    }

    .btn-ghost:hover {
      background: rgba(255,255,255,0.1);
      border-color: #fff;
    }

    .features {
      display: flex;
      gap: 1rem;
      margin-top: 3rem;
      flex-wrap: wrap;
      justify-content: center;
    }

    .feature-pill {
      background: rgba(255,255,255,0.12);
      border: 1px solid rgba(255,255,255,0.2);
      color: white;
      padding: 0.5rem 1.2rem;
      border-radius: 25px;
      font-size: 0.9rem;
    }
  </style>
</head>

<body>

  <div class="hero">
    <div class="hero-content">

      <div class="hero-logo">📘 Remote<span>Classroom</span></div>

      <p>
        Bridging the gap between rural students and quality education.  
        Access lectures, attempt quizzes, and learn — from anywhere.
      </p>

      <div class="hero-btns">
        <!-- ✅ FIXED SIGN IN BUTTON -->
        <a href="login.html" class="btn-primary">Sign In</a>

        <a href="register.html" class="btn-ghost">Create Account</a>
      </div>

      <div class="features">
        <span class="feature-pill">📄 PDF Lectures</span>
        <span class="feature-pill">🎬 Video Classes</span>
        <span class="feature-pill">📝 MCQ Quizzes</span>
        <span class="feature-pill">🏫 Class Groups</span>
      </div>

    </div>
  </div>

  <script>
    // redirect if already logged in
    if (localStorage.getItem('token')) {
      window.location.href = 'dashboard.html';
    }
  </script>

</body>
</html>
